<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgenDino — Login</title>
    <meta name="description" content="Sign in to AgenDino — your personal audio recording dashboard.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/login.css">
</head>
<body class="login-page" id="login-page">

    <!-- Animated background particles -->
    <div class="login-bg">
        <div class="login-bg-shape login-bg-shape--1"></div>
        <div class="login-bg-shape login-bg-shape--2"></div>
        <div class="login-bg-shape login-bg-shape--3"></div>
    </div>

    <div class="login-box">
        <!-- Logo / Brand -->
        <div class="login-logo" id="login-logo">
            <div class="login-brand-icon">
                <i class="bi bi-soundwave"></i>
            </div>
            <h1>AgenDino</h1>
            <p class="login-tagline">Audio Intelligence Dashboard</p>
        </div>

        <!-- Login Card -->
        <div class="card login-card" id="login-card">
            <div class="login-card-body">
                <p class="login-box-msg">Sign in to your account</p>

                <!-- Error alert -->
                <div class="login-alert login-alert--error" id="login-error" role="alert">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span id="login-error-msg">Invalid credentials</span>
                </div>

                <form id="login-form" autocomplete="on" novalidate>
                    <!-- Username -->
                    <div class="login-field" id="login-field-username">
                        <div class="login-input-wrapper">
                            <span class="login-input-icon">
                                <i class="bi bi-person-fill"></i>
                            </span>
                            <input
                                type="text"
                                id="login-username"
                                class="login-input"
                                placeholder="Username"
                                autocomplete="username"
                                required
                                autofocus
                            >
                            <span class="login-input-focus-line"></span>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="login-field" id="login-field-password">
                        <div class="login-input-wrapper">
                            <span class="login-input-icon">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input
                                type="password"
                                id="login-password"
                                class="login-input"
                                placeholder="Password"
                                autocomplete="current-password"
                                required
                            >
                            <button type="button" class="login-toggle-password" id="login-toggle-password" title="Show password">
                                <i class="bi bi-eye-fill"></i>
                            </button>
                            <span class="login-input-focus-line"></span>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="login-btn" id="login-submit">
                        <span class="login-btn-text" id="login-btn-text">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </span>
                        <span class="login-btn-spinner d-none" id="login-btn-spinner">
                            <span class="login-spinner"></span>
                            Authenticating…
                        </span>
                    </button>
                </form>
            </div>
        </div>

        <p class="login-footer">&copy; 2026 AgenDino</p>
    </div>

    <script src="/static/login.js"></script>
</body>
</html>
